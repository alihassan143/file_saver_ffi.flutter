name: file_saver_ffi
description: "A high-performance file saver for Flutter using FFI and JNI. Effortlessly save to gallery (images/videos) or device storage with original quality and custom album support."
version: 0.4.0
homepage: https://github.com/vanvixi/file_saver_ffi.flutter
repository: https://github.com/vanvixi/file_saver_ffi.flutter
issue_tracker: https://github.com/vanvixi/file_saver_ffi.flutter
topics:
  - file-saver
  - gallery-saver
  - saver
  - ffi
  - jni

screenshots:
  - description: "File Saver Ffi"
    path: screenshots/thumbnail.jpg

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.2.0
  jni: ^0.15.2
  path: ^1.9.1
  path_provider_windows: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
  jnigen: ^0.15.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
        package: com.vanvixi.file_saver_ffi
        pluginClass: FileSaverFfiPlugin
      ios:
        ffiPlugin: true
        sharedDarwinSource: true
      macos:
        ffiPlugin: true
        sharedDarwinSource: true
      windows:
        dartPluginClass: FileSaverWindows
        fileName: src/platforms/windows/file_saver_windows.dart