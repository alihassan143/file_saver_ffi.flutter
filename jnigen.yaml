# JNI bindings configuration for Android
# Run with `cd example && flutter build apk --debug && cd .. && fvm dart run jnigen --config jnigen.yaml`.
output:
  dart:
    path: lib/src/platforms/android/bindings.g.dart
    structure: single_file

source_path:
  - android/src/main/kotlin/com/vanvixi/file_saver_ffi

classes:
  # Main saver classes
  - 'com.vanvixi.file_saver_ffi.FileSaver'

  # Callback interface
  - 'com.vanvixi.file_saver_ffi.models.ProgressCallback'

class_path:
  - example/build/file_saver_ffi/tmp/kotlin-classes/debug