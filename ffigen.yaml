name: FileSaverFfiBindings
description: |
  Bindings for Darwin (iOS/macOS) `file_saver_ffi.h`.

  Regenerate bindings with `fvm dart run ffigen --config ffigen.yaml`.
output: 'lib/src/platforms/darwin/bindings.g.dart'
headers:
  entry-points:
    - 'darwin/Classes/FileSaver/FFI/file_saver_ffi.h'
  include-directives:
    - 'darwin/Classes/FileSaver/FFI/file_saver_ffi.h'
functions:
  include:
    - file_saver_init
    - file_saver_init_dart_api_dl
    - file_saver_save_bytes
    - file_saver_save_file
    - file_saver_save_network
    - file_saver_pick_directory
    - file_saver_save_bytes_as
    - file_saver_save_file_as
    - file_saver_save_network_as
    - file_saver_cancel
    - file_saver_dispose
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
